<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Payments System</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e1e2f 0%, #2a2a3d 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        nav {
            width: 270px;
            background: linear-gradient(180deg, #2a2a3d 0%, #1e1e2f 100%);
            box-shadow: 5px 0 20px rgba(0, 0, 0, 0.3);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            padding-top: 90px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000;
            animation: slideInNav 0.8s ease-out;
        }

        nav ul {
            list-style: none;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        nav ul li {
            width: 100%;
            margin: 14px 0;
            opacity: 0;
            animation: fadeInNav 0.7s ease forwards;
            animation-delay: calc(0.15s * var(--i));
        }

        nav ul li:nth-child(1) { --i: 1; }
        nav ul li:nth-child(2) { --i: 2; }
        nav ul li:nth-child(3) { --i: 3; }
        nav ul li:nth-child(4) { --i: 4; }

        nav ul li a {
            display: flex;
            align-items: center;
            width: 90%;
            margin: 0 auto;
            padding: 15px 25px;
            font-size: 1.1rem;
            font-weight: 400;
            text-decoration: none;
            color: #e0e0e0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 60px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        nav ul li a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(81, 111, 255, 0.4), transparent);
            transition: 0.6s;
        }

        nav ul li a:hover::before {
            left: 100%;
        }

        nav ul li a:hover {
            background: linear-gradient(135deg, #516bff, #ff6b6b);
            color: #ffffff;
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(81, 111, 255, 0.3);
        }

        nav ul li a:focus {
            outline: none;
            box-shadow: 0 0 0 4px rgba(81, 111, 255, 0.3);
        }

        main {
            margin-left: 270px;
            padding: 90px 60px;
            flex-grow: 1;
            background: rgba(30, 30, 47, 0.95);
            min-height: 100vh;
            animation: fadeInMain 1s ease-out;
        }

        header h1 {
            font-size: 3.5rem;
            margin-bottom: 60px;
            text-align: center;
            font-weight: 700;
            background: linear-gradient(45deg, #516bff, #ff6b6b, #6bc4ff);
            background-size: 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.3);
            animation: gradientShift 5s ease infinite;
        }

        .content-container {
            background: #2a2a3d;
            border-radius: 25px;
            padding: 50px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(81, 111, 255, 0.2);
            max-width: 1300px;
            margin: 0 auto;
            position: relative;
            animation: pulseGlow 3s ease-in-out infinite;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #e0e0e0;
            background: linear-gradient(180deg, #2a2a3d, #1e1e2f);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.95rem;
            margin-top: 70px;
            position: relative;
        }

        footer p {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        footer a {
            color: #516bff;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        footer a:hover {
            color: #ff6b6b;
        }

        .payment-icon {
            font-size: 1.2rem;
            color: #6bc4ff;
            animation: pulseIcon 2s ease-in-out infinite;
        }

        /* Keyframes */
        @keyframes slideInNav {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeInNav {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInMain {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3); }
            50% { box-shadow: 0 12px 50px rgba(81, 111, 255, 0.4); }
            100% { box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3); }
        }

        @keyframes pulseIcon {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }

        /* Floating particles for background effect */
        .particle {
            position: absolute;
            background: rgba(81, 111, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
        }

        @media (max-width: 768px) {
            nav {
                position: static;
                width: 100%;
                height: auto;
                padding: 20px 0;
                flex-direction: row;
                justify-content: center;
                border-right: none;
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            }

            nav ul {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 12px;
            }

            nav ul li {
                margin: 10px;
                width: auto;
            }

            nav ul li a {
                padding: 12px 20px;
                font-size: 1rem;
                border-radius: 50px;
            }

            main {
                margin-left: 0;
                padding: 50px 25px;
            }

            header h1 {
                font-size: 2.5rem;
                margin-bottom: 40px;
            }

            .content-container {
                padding: 30px;
            }

            footer {
                padding: 20px;
            }
        }

        @media (max-width: 480px) {
            nav ul li a {
                padding: 10px 16px;
                font-size: 0.9rem;
            }

            main {
                padding: 40px 20px;
            }

            header h1 {
                font-size: 2rem;
            }

            .content-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="{% url 'UserHome' %}">🏠 Dashboard</a></li>
            <li><a href="{% url 'training' %}">💸 Transactions</a></li>
            <li><a href="{% url 'prediction' %}">📊 Analytics</a></li>
            <li><a href="{% url 'dataset_view' %}">📊 Datasetview</a></li>
            <li><a href="{% url 'index' %}">🚪 Logout</a></li>
        </ul>
    </nav>

    <main>
        <header>
            <h1>Digital Payments System</h1>
        </header>
        <div class="content-container">
            {% block contents %}
            <!-- Dynamic content will render here -->
            {% endblock %}
        </div>
    </main>

    <footer>
        <p><span class="payment-icon">💳</span> © 2025 Digital Payments System. All rights reserved. | <a href="#">Contact Us</a></p>
    </footer>

    <script>
        // JavaScript for interactive particles
        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            const size = Math.random() * 10 + 5;
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${Math.random() * 100}vw`;
            particle.style.top = `${Math.random() * 100}vh`;
            particle.style.animationDuration = `${Math.random() * 4 + 4}s`;
            document.body.appendChild(particle);

            setTimeout(() => {
                particle.remove();
            }, 8000);
        }

        // Generate particles at intervals
        setInterval(createParticle, 500);

        // Add hover effect for content container
        const contentContainer = document.querySelector('.content-container');
        contentContainer.addEventListener('mousemove', (e) => {
            const rect = contentContainer.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            contentContainer.style.background = `radial-gradient(circle at ${x}px ${y}px, rgba(81, 111, 255, 0.2), #2a2a3d)`;
        });

        contentContainer.addEventListener('mouseleave', () => {
            contentContainer.style.background = '#2a2a3d';
        });
    </script>
</body>
</html>
