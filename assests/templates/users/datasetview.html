<!-- templates/datasetview.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Digital Payment Dataset Viewer</title>
    <style>
        body {
            background-color: #1c1c1c;
            color: #f0f0f0;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            color: #fff;
        }
        th, td {
            border: 1px solid #444;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #2d2d2d;
        }
        tr:nth-child(even) {
            background-color: #2a2a2a;
        }
        h1 {
            color: #00bcd4;
        }
    </style>
</head>
<body>
    <h1>📊 Digital Payment Dataset Viewer</h1>
    <p>Total Rows: {{ df.shape.0 }} | Total Columns: {{ df.shape.1 }}</p>
    <table>
        <thead>
            <tr>
                {% for col in df.columns %}
                <th>{{ col }}</th>
                {% endfor %}
            </tr>
        </thead>
        <tbody>
            {% for row in df.values %}
            <tr>
                {% for item in row %}
                <td>{{ item }}</td>
                {% endfor %}
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
